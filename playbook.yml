- name: Setup environment
  hosts: servers
  become: yes

  tasks:

    - name: Install Python, pip, venv
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present
        update_cache: yes

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Install Java (for Jenkins)
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present
